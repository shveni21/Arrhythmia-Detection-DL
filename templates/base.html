<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cardiac Arrhythmia Detection System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #e0f2fe 0%, #bfdbfe 50%, #fff 100%);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="gradient-bg min-h-screen">
    
    <nav class="bg-white shadow-lg border-b-2 border-blue-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-2xl font-bold bg-gradient-to-r from-blue-500 to-cyan-500 bg-clip-text text-transparent">
                        <i class="bi bi-heart-pulse"></i> CardioAI
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    {% if session.user_id %}
                        <span class="text-gray-700">Welcome, {{ session.name }}</span>
                        <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    {% else %}
                        <a href="/login" class="text-blue-600 hover:text-blue-800">Login</a>
                        <a href="/signup" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">Sign Up</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-white py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>&copy; 2024 CardioAI - Advanced Cardiac Arrhythmia Detection System</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
